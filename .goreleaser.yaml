version: 2

before:
  hooks:
    - go mod tidy
    - go generate ./...

builds:
  - id: dhq
    main: ./cmd/deployhq
    binary: dhq
    env:
      - CGO_ENABLED=0
    goos:
      - linux
      - darwin
      - windows
    goarch:
      - amd64
      - arm64
    ldflags:
      - -s -w -X main.version={{.Version}}

archives:
  - id: dhq
    builds:
      - dhq
    name_template: "dhq_{{ .Version }}_{{ .Os }}_{{ .Arch }}"
    format_overrides:
      - goos: windows
        format: zip

checksum:
  name_template: "checksums.txt"

changelog:
  sort: asc
  filters:
    exclude:
      - "^docs:"
      - "^test:"
      - "^ci:"
      - "^chore:"

brews:
  - name: dhq
    repository:
      owner: deployhq
      name: homebrew-tap
      token: "{{ .Env.HOMEBREW_TAP_GITHUB_TOKEN }}"
    homepage: "https://www.deployhq.com"
    description: "DeployHQ CLI — deploy from your terminal"
    license: "MIT"
    install: |
      bin.install "dhq"
    test: |
      system "#{bin}/dhq", "version"

# Uncomment when deployhq/scoop-bucket repo is created:
# scoops:
#   - name: dhq
#     repository:
#       owner: deployhq
#       name: scoop-bucket
#     homepage: "https://www.deployhq.com"
#     description: "DeployHQ CLI — deploy from your terminal"
#     license: "MIT"

nfpms:
  - id: dhq
    package_name: dhq
    vendor: DeployHQ
    homepage: "https://www.deployhq.com"
    description: "DeployHQ CLI — deploy from your terminal"
    license: "MIT"
    formats:
      - deb
      - rpm
    bindir: /usr/bin

release:
  github:
    owner: deployhq
    name: deployhq-cli
  prerelease: auto
